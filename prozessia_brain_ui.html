<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prozessia Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ── Tokens ──────────────────────────────────────────── */
:root{
  --f-d:'DM Serif Display',serif;
  --f-u:'DM Sans',sans-serif;
  --f-m:'JetBrains Mono',monospace;

  --bg:#0D0D0D;
  --s0:#111111;
  --s1:#161616;
  --s2:#1E1E1E;
  --b0:#1E1E1E;
  --b1:#2A2A2A;
  --b2:#383838;

  --purple:#534AB7;
  --pl:#B088FF;
  --pd:#1E1C3A;
  --pm:#6B62D4;

  --text:#FFFFFF;
  --tm:#B8B8C2;
  --tf:#5A5A66;

  --green:#3DB87A;
  --orange:#D4860A;
  --red:#E05252;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--tm);
  font-family:var(--f-u);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--purple)}

/* ── Layout ──────────────────────────────────────────── */
.app{
  display:grid;
  grid-template-columns:1fr 300px;
  height:100vh;
  overflow:hidden;
}

/* ═══════════════════════════════════
   CHAT PANEL
═══════════════════════════════════ */
.chat-panel{
  display:flex;flex-direction:column;
  height:100vh;overflow:hidden;
  background:var(--bg);
  position:relative;
}

/* Header */
.chat-header{
  display:flex;align-items:center;
  padding:16px 22px 14px;
  border-bottom:1px solid var(--b0);
  flex-shrink:0;
  gap:12px;
}
.logo{
  font-family:var(--f-d);font-size:18px;color:var(--text);
  letter-spacing:-.01em;line-height:1;flex-shrink:0;
}
.logo sup{
  font-family:var(--f-u);font-size:9px;color:var(--tf);
  text-transform:uppercase;letter-spacing:.1em;
  font-weight:400;vertical-align:super;margin-left:4px;
}
.header-date{
  font-family:var(--f-m);font-size:11px;color:var(--tf);
  margin-left:4px;
}
.header-actions{display:flex;gap:6px;margin-left:auto}
.hbtn{
  background:var(--s1);border:1px solid var(--b0);border-radius:8px;
  color:var(--tf);cursor:pointer;padding:7px;display:flex;align-items:center;
  transition:all 150ms;
}
.hbtn:hover{border-color:var(--b2);color:var(--tm);background:var(--s2)}
.hbtn svg{width:14px;height:14px}
.status-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:99px;
  font-family:var(--f-m);font-size:10px;
  border:1px solid var(--b1);cursor:default;
}
.status-dot{width:6px;height:6px;border-radius:50%}
.model-select{
  background:var(--s1);border:1px solid var(--b0);border-radius:8px;
  color:var(--tf);cursor:pointer;padding:5px 8px;
  font-family:var(--f-m);font-size:10px;letter-spacing:.03em;
  transition:all 150ms;appearance:none;-webkit-appearance:none;
  outline:none;
}
.model-select:hover{border-color:var(--b2);color:var(--tm);background:var(--s2)}
.model-select option{background:#1a1a1a;color:var(--text)}
.msg-actions{display:flex;gap:6px;margin-top:4px;opacity:0;transition:opacity 150ms}
.msg-brain:hover .msg-actions{opacity:1}
.act-btn{
  background:none;border:1px solid var(--b0);border-radius:6px;
  color:var(--tf);cursor:pointer;font-family:var(--f-m);font-size:10px;
  padding:3px 8px;transition:all 120ms;
}
.act-btn:hover{border-color:var(--b2);color:var(--tm);background:var(--s2)}
.act-btn.saved{color:#4caf50;border-color:#4caf50}
.li-tabs{display:flex;gap:4px;margin:6px 0 8px}
.li-tab{
  flex:1;background:var(--s1);border:1px solid var(--b0);border-radius:6px;
  color:var(--tf);cursor:pointer;font-family:var(--f-m);font-size:10px;
  padding:5px 4px;transition:all 120ms;
}
.li-tab.active{background:var(--s2);border-color:var(--b2);color:var(--tm)}
.li-post-card{
  background:var(--s1);border:1px solid var(--b0);border-radius:8px;
  padding:8px 10px;margin-bottom:6px;
}
.li-post-day{font-family:var(--f-m);font-size:9px;color:var(--tf);text-transform:uppercase;letter-spacing:.08em}
.li-post-title{font-size:12px;color:var(--text);margin:2px 0;font-weight:500}
.li-post-preview{font-size:11px;color:var(--tf);line-height:1.4}
.li-idea-row{
  padding:6px 0;border-bottom:1px solid var(--b0);cursor:pointer;
}
.li-idea-row:last-child{border-bottom:none}
.li-idea-kat{font-family:var(--f-m);font-size:9px;color:var(--tf);text-transform:uppercase;letter-spacing:.06em}
.li-idea-title{font-size:11px;color:var(--text);margin:1px 0}
.li-idea-hook{font-size:10px;color:var(--tf);font-style:italic}
.dot-on{background:var(--green);box-shadow:0 0 5px rgba(61,184,122,.5);animation:pulse 2.5s infinite}
.dot-off{background:var(--tf)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Drop zone */
.drop-overlay{
  position:absolute;inset:0;z-index:50;
  background:rgba(83,74,183,.1);
  border:2px dashed var(--purple);border-radius:16px;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  color:var(--pl);font-size:15px;pointer-events:none;
}
.drop-overlay svg{width:38px;height:38px}
.chat-panel.dragging .drop-overlay{display:flex}

/* Messages area */
.messages-wrap{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
}

/* Empty state */
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;position:relative;overflow:hidden;
  padding:40px;
}
.starfield{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--pl);opacity:.1}
.empty-glyph{
  width:52px;height:52px;border-radius:50%;
  background:var(--pd);border:1px solid rgba(83,74,183,.3);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.empty-glyph svg{width:24px;height:24px;color:var(--pl)}
.empty-title{
  font-family:var(--f-d);font-size:26px;color:var(--text);
  text-align:center;position:relative;z-index:1;
  letter-spacing:-.01em;line-height:1.25;
}
.empty-hint{
  font-size:13px;color:var(--tf);
  position:relative;z-index:1;text-align:center;
}

/* Messages */
.messages{
  flex:1;overflow-y:auto;
  padding:22px 22px 10px;
  display:flex;flex-direction:column;gap:18px;
}

/* Attachment card */
.attachment-card{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--s1);border:1px solid var(--b0);
  border-radius:10px;padding:9px 14px;
  margin-bottom:6px;max-width:300px;
}
.att-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--pd);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.att-icon svg{width:15px;height:15px;color:var(--pl)}
.att-name{font-size:13px;color:var(--text);font-weight:500;line-height:1.2}
.att-size{font-family:var(--f-m);font-size:10px;color:var(--tf);margin-top:2px}

.msg-user{display:flex;flex-direction:column;align-items:flex-end}
.msg-brain{display:flex;flex-direction:column;align-items:flex-start;width:100%}

.msg-user .bubble{
  background:var(--pd);border:1px solid rgba(83,74,183,.4);
  border-radius:14px 4px 14px 14px;
  padding:10px 15px;max-width:72%;
  color:var(--text);font-size:14px;line-height:1.6;
}
.msg-brain .bubble{
  background:var(--s0);border:1px solid var(--b0);
  border-radius:4px 14px 14px 14px;
  padding:14px 18px;width:100%;
  color:var(--tm);font-size:14px;line-height:1.75;
}
.msg-brain .bubble strong{color:var(--text);font-weight:500}
.msg-brain .bubble em{color:var(--pl)}
.msg-brain .bubble h1,.msg-brain .bubble h2,.msg-brain .bubble h3{
  font-family:var(--f-d);color:var(--text);font-weight:400;margin:14px 0 8px;letter-spacing:-.01em;
}
.msg-brain .bubble h2{font-size:17px}
.msg-brain .bubble h3{font-size:15px}
.msg-brain .bubble ul,.msg-brain .bubble ol{padding-left:18px;margin:6px 0}
.msg-brain .bubble li{margin-bottom:4px}
.msg-brain .bubble code{
  font-family:var(--f-m);font-size:11px;
  background:var(--s2);border:1px solid var(--b0);
  border-radius:4px;padding:1px 6px;
}
.msg-brain .bubble pre{
  background:var(--s2);border:1px solid var(--b0);border-radius:8px;
  padding:12px;margin:10px 0;overflow-x:auto;
  font-family:var(--f-m);font-size:12px;
}
.msg-brain .bubble blockquote{
  border-left:2px solid var(--purple);
  padding-left:14px;color:var(--tf);margin:8px 0;
}
.msg-brain .bubble hr{border:none;border-top:1px solid var(--b0);margin:12px 0}
.msg-meta{
  font-family:var(--f-m);font-size:10px;color:var(--tf);margin-top:5px;
}
.msg-user .msg-meta{text-align:right}

/* Typing */
.typing{display:inline-flex;align-items:center;gap:4px;padding:4px 2px}
.typing span{
  width:6px;height:6px;border-radius:50%;background:var(--tf);
  animation:blink 1.2s ease-in-out infinite;
}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Input */
.input-area{
  border-top:1px solid var(--b0);background:var(--s0);
  padding:12px 18px 16px;flex-shrink:0;
}
.file-bar{
  display:none;align-items:center;gap:8px;
  margin-bottom:10px;padding:8px 12px;
  background:var(--s2);border:1px solid var(--b0);border-radius:8px;
}
.file-bar.show{display:flex}
.fb-icon{width:22px;height:22px;border-radius:5px;background:var(--pd);display:flex;align-items:center;justify-content:center}
.fb-icon svg{width:11px;height:11px;color:var(--pl)}
.fb-name{font-size:12px;color:var(--tm);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fb-rm{background:none;border:none;cursor:pointer;color:var(--tf);padding:4px;border-radius:4px;display:flex;transition:color 150ms}
.fb-rm:hover{color:var(--text)}
.fb-rm svg{width:13px;height:13px}

.input-row{display:flex;align-items:flex-end;gap:8px}
.input-btns{display:flex;gap:4px;flex-shrink:0;padding-bottom:5px}
.ibtn{
  background:var(--s2);border:1px solid var(--b0);border-radius:8px;
  color:var(--tf);cursor:pointer;padding:7px;display:flex;
  transition:all 150ms;
}
.ibtn:hover{border-color:var(--b2);color:var(--tm)}
.ibtn svg{width:15px;height:15px}
textarea#inp{
  flex:1;background:var(--s1);border:1px solid var(--b0);
  border-radius:12px;color:var(--text);
  font-family:var(--f-u);font-size:14px;
  padding:10px 15px;resize:none;outline:none;
  min-height:44px;max-height:130px;overflow-y:auto;
  transition:border-color 150ms;
}
textarea#inp:focus{border-color:var(--purple)}
textarea#inp::placeholder{color:var(--tf)}
.send{
  background:var(--purple);border:none;border-radius:10px;color:#fff;
  cursor:pointer;padding:10px 18px;
  display:flex;align-items:center;gap:7px;
  font-family:var(--f-u);font-size:13px;font-weight:500;
  transition:background 150ms;align-self:flex-end;height:44px;
  white-space:nowrap;flex-shrink:0;
}
.send:hover{background:var(--pm)}
.send:disabled{background:var(--b2);cursor:default}
.send svg{width:14px;height:14px}
#file-input{display:none}

/* ═══════════════════════════════════
   RIGHT PANEL
═══════════════════════════════════ */
.right-panel{
  background:var(--s0);border-left:1px solid var(--b0);
  height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;
}

.rp-section{
  padding:16px 16px 18px;border-bottom:1px solid var(--b0);
  border:1px solid transparent;border-radius:8px;
  transition:box-shadow 0.15s ease, border-color 0.15s ease;
}
.rp-label{
  font-family:var(--f-m);font-size:9px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--tf);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.rp-link{
  font-family:var(--f-u);font-size:10px;font-weight:400;
  color:var(--pl);cursor:pointer;text-transform:none;letter-spacing:0;
  transition:color 150ms;background:none;border:none;padding:0;
}
.rp-link:hover{color:var(--text)}

/* Loading skeleton */
.skeleton{
  background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;height:14px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-row{margin-bottom:10px}
.skel-sm{height:10px;width:60%;margin-top:4px}

/* ── Datei-Browser ──────────────────────────────── */
.fb-search{
  width:100%;background:var(--s1);border:1px solid var(--b0);border-radius:8px;
  color:var(--text);font-size:12px;padding:7px 10px;outline:none;box-sizing:border-box;
  margin-bottom:10px;
}
.fb-search:focus{border-color:var(--b2)}
.fb-folder{margin-bottom:2px}
.fb-folder-header{
  display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;
  cursor:pointer;font-size:12px;color:var(--tm);font-weight:500;
  transition:background 120ms;user-select:none;
}
.fb-folder-header:hover{background:var(--s2)}
.fb-folder-icon{font-size:11px;transition:transform 150ms;display:inline-block}
.fb-folder-icon.open{transform:rotate(90deg)}
.fb-children{display:none;padding-left:16px}
.fb-children.open{display:block}
.fb-file{
  display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;
  cursor:pointer;font-size:11px;color:var(--pl);
  transition:background 120ms;
}
.fb-file:hover{background:var(--s2);color:var(--text)}
.fb-file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fb-ext{
  font-size:9px;font-family:var(--f-m);letter-spacing:.04em;
  padding:1px 5px;border-radius:4px;flex-shrink:0;
}
.ext-pdf{background:#ff444422;color:#ff8888}
.ext-docx,.ext-doc{background:#4488ff22;color:#88aaff}
.ext-xlsx,.ext-xls,.ext-csv{background:#44ff8822;color:#88ffaa}
.ext-md{background:#aa88ff22;color:#cc99ff}
.ext-other{background:var(--s2);color:var(--tf)}

/* ── Termine ────────────────────────────────────── */
.termin{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px;background:var(--s1);border:1px solid var(--b0);
  border-radius:10px;margin-bottom:8px;cursor:pointer;
  transition:border-color 150ms,background 150ms;
}
.termin:last-child{margin-bottom:0}
.termin:hover{border-color:var(--b2);background:var(--s2)}
.termin-date{
  background:var(--pd);border-radius:8px;
  padding:6px 8px;text-align:center;flex-shrink:0;min-width:38px;
}
.t-day{font-family:var(--f-m);font-size:16px;font-weight:500;color:var(--pl);line-height:1;display:block}
.t-mon{font-family:var(--f-m);font-size:9px;color:var(--tf);text-transform:uppercase;letter-spacing:.04em;display:block;margin-top:2px}
.termin-info{flex:1;min-width:0}
.t-title{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-time{font-family:var(--f-m);font-size:10px;color:var(--tf);margin-top:2px}
.t-badge{
  font-size:9px;padding:2px 8px;border-radius:99px;flex-shrink:0;margin-top:1px;white-space:nowrap;
}
.badge-dl{background:rgba(224,82,82,.15);color:#E57065;border:1px solid rgba(224,82,82,.3)}
.badge-mt{background:rgba(83,74,183,.2);color:var(--pl);border:1px solid rgba(83,74,183,.3)}

.no-data{font-size:12px;color:var(--tf);padding:4px 0;text-align:center}

/* ── Mails ──────────────────────────────────────── */
.mail{
  display:flex;align-items:flex-start;gap:9px;
  padding:8px;border-radius:8px;cursor:pointer;
  transition:background 150ms;margin-bottom:2px;
}
.mail:hover{background:var(--s2)}
.mail-av{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-m);font-size:10px;font-weight:500;
  flex-shrink:0;color:#fff;
}
.mail-body{flex:1;min-width:0}
.mail-from{
  font-size:12px;color:var(--text);font-weight:500;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.mail-time{font-family:var(--f-m);font-size:10px;color:var(--tf);white-space:nowrap;flex-shrink:0}
.mail-subj{font-size:12px;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.unread-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0;margin-top:5px}

/* ── Deadlines ──────────────────────────────────── */
.dl-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 8px;border-radius:8px;margin-bottom:2px;cursor:pointer;
  transition:background 150ms;
}
.dl-item:hover{background:var(--s2)}
.dl-cb{
  width:14px;height:14px;border-radius:4px;
  border:1px solid var(--b2);flex-shrink:0;cursor:pointer;
  position:relative;transition:all 150ms;
}
.dl-cb:hover{border-color:var(--purple)}
.dl-cb.done{background:var(--purple);border-color:var(--purple)}
.dl-cb.done::after{
  content:'';position:absolute;left:2px;top:0;
  width:8px;height:5px;
  border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;
  transform:rotate(-45deg);
}
.dl-text{flex:1;font-size:12px;color:var(--tm);line-height:1.35}
.dl-item.done .dl-text{text-decoration:line-through;color:var(--tf)}
.dl-date{font-family:var(--f-m);font-size:10px;white-space:nowrap;flex-shrink:0}
.dl-urgent{color:var(--red)}
.dl-soon{color:var(--orange)}
.dl-normal{color:var(--tf)}

</style>
</head>
<body>

<div class="app">

  <!-- ═══ CHAT ═══ -->
  <section class="chat-panel" id="chat-panel"
    ondragover="onDragOver(event)"
    ondragleave="onDragLeave(event)"
    ondrop="onDrop(event)">

    <div class="drop-overlay" id="drop-overlay">
      <svg data-lucide="upload-cloud"></svg>
      Datei ins Brain laden
    </div>

    <header class="chat-header">
      <div class="logo">Prozessia.<sup>Brain</sup></div>
      <div class="header-date" id="header-date"></div>
      <div class="header-actions">
        <div class="status-pill" id="status-pill" title="Server-Status">
          <span class="status-dot dot-off" id="status-dot"></span>
          <span id="status-label" style="font-size:10px;color:var(--tf)">…</span>
        </div>
        <div id="ngrok-url" style="display:none;align-items:center;font-size:10px;color:var(--tf);background:var(--s2);border-radius:6px;padding:2px 7px;gap:2px;max-width:280px;overflow:hidden;white-space:nowrap"></div>
        <select class="model-select" id="model-select" title="Modell wählen">
          <option value="claude-sonnet-5" selected>◆ Sonnet</option>
          <option value="claude-opus-4-8">✦ Opus — Tiefenanalyse</option>
        </select>
        <button class="hbtn" id="inbox-btn" title="Inbox verarbeiten — neue Dateien aus _inbox/ indexieren" onclick="processInbox()" style="font-size:11px;padding:0 8px;min-width:unset;">📥</button>
        <button class="hbtn" title="Gespräch löschen" onclick="clearChat()"><svg data-lucide="plus"></svg></button>
      </div>
    </header>

    <div class="messages-wrap" id="messages-wrap">
      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="starfield" id="starfield"></div>
        <div class="empty-glyph"><svg data-lucide="brain-circuit"></svg></div>

<script>

const API = "http://localhost:3001";
let history = [];      // chat history for Claude context
let pendingFile = null;
let streaming = false;
let renderInterval = null;

/* ── Init ───────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  buildStars();
  setHeaderDate();
  checkStatus();
  loadCalendar();
  loadGmail();
  loadTasks();
  loadLinkedIn();
  loadFiles();
  setInterval(checkStatus, 30000);
  setInterval(() => loadTasks(true), 30000);  // Task-Panel alle 30s aktualisieren
  restoreHistory();
});

/* ── Header date ────────────────────────────────── */
function setHeaderDate() {
  const d = new Date();
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  document.getElementById('header-date').textContent =
    `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]}`;
}

/* ── Starfield ──────────────────────────────────── */
function buildStars() {
  const sf = document.getElementById('starfield');
  if (!sf) return;
  [[8,12],[22,34],[41,8],[65,19],[84,7],[93,31],[12,55],[29,48],
   [55,62],[74,43],[88,58],[5,78],[19,85],[38,72],[60,88],[78,75],
   [92,82],[47,35],[70,27],[15,40],[35,22],[58,50],[80,65],[25,65],
   [45,80],[68,92],[90,48]].forEach(([t,l]) => {
    const s = document.createElement('span');
    s.className = 'star';
    s.style.top = t + '%'; s.style.left = l + '%';
    sf.appendChild(s);
  });
}

/* ── Server status ──────────────────────────────── */
async function checkStatus() {
  try {
    const r = await fetch(`${API}/api/status`, {signal: AbortSignal.timeout(3000)});
    const d = await r.json();
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    dot.className = 'status-dot dot-on';
    const parts = ['Brain aktiv'];
    if (d.gmail)   parts.push('Gmail ✓');
    if (d.outlook) parts.push('Outlook ✓');
    if (d.rag_docs) parts.push(`${d.rag_docs} Docs`);
    lbl.textContent = parts.join(' · ');
    lbl.style.color = 'var(--green)';
    // Ngrok-URL als kopierbaren Link anzeigen
    const ngrokEl = document.getElementById('ngrok-url');
    if (ngrokEl) {
      if (d.ngrok_url) {
        ngrokEl.innerHTML = `🔗 <a href="${d.ngrok_url}" target="_blank" style="color:var(--acc);text-decoration:none;" title="Amin's URL — klicken zum Öffnen">${d.ngrok_url.replace('https://','')}</a> <button onclick="navigator.clipboard.writeText('${d.ngrok_url}')" style="background:none;border:none;cursor:pointer;color:var(--tf);font-size:11px;padding:0 4px" title="Kopieren">📋</button>`;
        ngrokEl.style.display = 'flex';
      } else {
        ngrokEl.style.display = 'none';
      }
    }
  } catch {
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    dot.className = 'status-dot dot-off';
    lbl.textContent = 'Server offline';
    lbl.style.color = 'var(--tf)';
  }
}

/* ── Inbox Processor ─────────────────────────────── */
async function processInbox() {
  const btn = document.getElementById('inbox-btn');
  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/inbox_process`, {method:'POST', signal: AbortSignal.timeout(120000)});
    const d = await r.json();
    btn.textContent = '📥';
    btn.disabled = false;
    const msg = d.ok
      ? `Inbox verarbeitet. ${d.new_indexed} neue Dokumente indexiert.\n\n${d.output}`
      : `Fehler: ${d.output}`;
    addMsg('assistant', msg);
    checkStatus();
  } catch(e) {
    btn.textContent = '📥';
    btn.disabled = false;
    addMsg('assistant', `Inbox-Verarbeitung fehlgeschlagen: ${e.message}`);
  }
}

/* ── Chat ───────────────────────────────────────── */
function clearChat() {
  history = [];
  localStorage.removeItem('brain_history');
  document.getElementById('empty-state').style.display = 'flex';
  const msgs = document.getElementById('messages');
  msgs.style.display = 'none';
  msgs.innerHTML = '';
  removeFile();
  document.getElementById('inp').value = '';
  document.getElementById('inp').style.height = 'auto';
}

/* ── localStorage persistence ───────────────────── */
const LS_KEY = 'brain_history';
const LS_MAX = 40; // max messages to persist

function saveHistory() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(history.slice(-LS_MAX)));
  } catch {}
}

function restoreHistory() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (!saved) return;
    const msgs_data = JSON.parse(saved);
    if (!msgs_data.length) return;
    history = msgs_data;
    const msgs = showMessages();
    msgs_data.forEach(m => {
      const el = document.createElement('div');
      el.className = m.role === 'user' ? 'msg-user' : 'msg-brain';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (m.role === 'user') {
        bubble.textContent = m.content;
      } else {
        bubble.innerHTML = renderMD(m.content);
        const actions = makeActions(m.content);
        el.appendChild(bubble);
        el.appendChild(actions);
        msgs.appendChild(el);
        return;
      }
      el.appendChild(bubble);
      msgs.appendChild(el);
    });
    lucide.createIcons();
    scrollBottom(msgs);
  } catch {}
}

/* ── Remember (save to memory.md) ───────────────── */
async function remember(text, btn) {
  btn.textContent = '…';
  try {
    const r = await fetch(`${API}/api/remember`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text}),
    });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = '✓ Gespeichert';
      btn.classList.add('saved');
    } else {
      btn.textContent = 'Fehler';
    }
  } catch {
    btn.textContent = 'Fehler';
  }
}

function makeActions(content) {
  const div = document.createElement('div');
  div.className = 'msg-actions';
  const btn = document.createElement('button');
  btn.className = 'act-btn';
  btn.textContent = '⊕ Merken';
  btn.onclick = () => remember(content, btn);
  div.appendChild(btn);
  return div;
}

function showMessages() {
  document.getElementById('empty-state').style.display = 'none';
  const m = document.getElementById('messages');
  m.style.display = 'flex';
  return m;
}

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if ((!text && !pendingFile) || streaming) return;

  const msgs = showMessages();
  const ts = now();

  // User message
  const userEl = document.createElement('div');
  userEl.className = 'msg-user';
  if (pendingFile) {
    const attEl = document.createElement('div');
    attEl.className = 'attachment-card';
    attEl.innerHTML = `
      <div class="att-icon"><svg data-lucide="file-text"></svg></div>
      <div>
        <div class="att-name">${esc(pendingFile.name)}</div>
        <div class="att-size">${(pendingFile.size/1024).toFixed(0)} KB</div>
      </div>`;
    userEl.appendChild(attEl);
  }
  if (text) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    userEl.appendChild(b);
  }
  const meta1 = document.createElement('div');
  meta1.className = 'msg-meta';
  meta1.textContent = ts;
  userEl.appendChild(meta1);
  msgs.appendChild(userEl);

  // Brain typing bubble
  const brainEl = document.createElement('div');
  brainEl.className = 'msg-brain';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  brainEl.appendChild(bubble);
  msgs.appendChild(brainEl);
  scrollBottom(msgs);
  lucide.createIcons();

  // Prepare message content
  let msgContent = text || '';

  // Add to history
  history.push({role: 'user', content: msgContent});

  // Clear inputs
  inp.value = '';
  inp.style.height = 'auto';
  const sentFile = pendingFile;
  removeFile();
  setSendDisabled(true);

  // Stream response
  streaming = true;
  let fullText = '';

  try {
    const model = document.getElementById('model-select').value;
    const resp = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages: history, model}),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const d = JSON.parse(raw);
          if (d.tasks_updated) {
            loadTasks(true);
            flashTaskPanel();
          }
          if (d.chunk) {
            fullText += d.chunk;
            bubble.innerHTML = renderMD(fullText);
            scrollBottom(msgs);
          }
          if (d.error) {
            fullText = `Fehler: ${d.error}`;
            bubble.textContent = fullText;
          }
        } catch {}
      }
    }

    // Add brain response to history
    if (fullText) {
      history.push({role: 'assistant', content: fullText});
      saveHistory();
      brainEl.appendChild(makeActions(fullText));
      // Signal: Ideen generieren
      const genMatch = fullText.match(/\[GENERATE_IDEAS(?::\s*([^\]]*))?\]/i);
      if (genMatch) {
        liTab('ideas');
        setTimeout(() => generateIdeas((genMatch[1]||'').trim()), 500);
      }
      // Signal: fertige Posts schreiben
      const postMatch = fullText.match(/\[GENERATE_POSTS(?::\s*([\s\S]*?))?\]/i);
      if (postMatch) {
        liTab('posts');
        setTimeout(() => generatePosts((postMatch[1]||'').trim()), 500);
      }
      // Task-Signale: Sidebar immer neu laden wenn Task-relevante Signale im Text
      if (/\[TASK_(?:ADD|DONE|REMOVE|S_SET|S_REPLACE):/i.test(fullText) || /\[TASKS_SET:/i.test(fullText)) {
        setTimeout(() => { loadTasks(true); flashTaskPanel(); }, 300);
      }
    }

  } catch (err) {
    bubble.innerHTML = `<span style="color:var(--red)">Server nicht erreichbar. Starte: <code>python3 _agent/brain_server.py</code></span>`;
  }

  // Add timestamp
  const meta2 = document.createElement('div');
  meta2.className = 'msg-meta';
  meta2.textContent = `Brain · ${ts}`;
  brainEl.appendChild(meta2);

  streaming = false;
  setSendDisabled(false);
  scrollBottom(msgs);
}

/* ── Markdown renderer (lightweight) ─────────────── */
function renderMD(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // code blocks
    .replace(/```[\s\S]*?```/g, m => {
      const code = m.replace(/^```\w*\n?/,'').replace(/```$/,'');
      return `<pre>${code}</pre>`;
    })
    // inline code
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    // bold
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    // italic
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    // h1-h3
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    // hr
    .replace(/^---$/gm,'<hr>')
    // bullet list
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)\n(?!<li>)/g,'<ul>$1</ul>\n')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    // numbered list
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    // blockquote
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    // line breaks (double newline = paragraph)
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

/* ── File upload → sofort verarbeiten ──────────── */
async function uploadAndIndex(file) {
  // Sofort-Feedback im Chat
  const msgs = document.getElementById('messages-wrap');
  const info = document.createElement('div');
  info.className = 'msg brain';
  info.innerHTML = `<div class="bubble" style="opacity:.7">⏳ Verarbeite <b>${esc(file.name)}</b>…</div>`;
  msgs.appendChild(info);
  scrollBottom(msgs);

  const form = new FormData();
  form.append('file', file);
  try {
    const r = await fetch(`${API}/api/upload`, {method:'POST', body: form, signal: AbortSignal.timeout(120000)});
    const d = await r.json();
    if (d.ok) {
      info.querySelector('.bubble').innerHTML =
        `✓ <b>${esc(file.name)}</b> verarbeitet und ins Wissen aufgenommen.<br>` +
        `<span style="font-size:11px;opacity:.7">${esc(d.output.split('\n').pop() || '')}</span>`;
    } else {
      info.querySelector('.bubble').innerHTML =
        `⚠️ Fehler beim Verarbeiten: ${esc(d.error || d.output || 'Unbekannt')}`;
    }
    checkStatus();
  } catch(e) {
    info.querySelector('.bubble').innerHTML = `⚠️ Upload fehlgeschlagen: ${esc(e.message)}`;
  }
  removeFile();
}

function onFileInput(el) {
  const f = el.files[0];
  if (!f) return;
  el.value = '';
  uploadAndIndex(f);
}
function removeFile() {
  pendingFile = null;
  document.getElementById('file-bar').classList.remove('show');
}

/* ── Drag & drop ────────────────────────────────── */
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('chat-panel').classList.add('dragging');
}
function onDragLeave(e) {
  if (!e.relatedTarget || !e.currentTarget.contains(e.relatedTarget))
    document.getElementById('chat-panel').classList.remove('dragging');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('chat-panel').classList.remove('dragging');
  const f = e.dataTransfer.files[0];
  if (f) uploadAndIndex(f);
}

/* ── Calendar ───────────────────────────────────── */
async function loadCalendar(force) {
  const el = document.getElementById('cal-body');
  try {
    const r = await fetch(`${API}/api/calendar`, {signal: AbortSignal.timeout(8000)});
    if (!r.ok) throw new Error();
    const events = await r.json();
    if (!events.length) { el.innerHTML = '<div class="no-data">Keine Termine in den nächsten 45 Tagen.</div>'; return; }
    el.innerHTML = events.slice(0,6).map(e => {
      const d = new Date(e.start);
      const day = d.getDate();
      const mon = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()];
      const timeStr = e.allDay ? 'Ganztägig' : d.toLocaleTimeString('de', {hour:'2-digit',minute:'2-digit'}) + ' Uhr' + (e.location ? ' · ' + e.location.slice(0,22) : '');
      const badge = e.type === 'deadline'
        ? '<span class="t-badge badge-dl">Deadline</span>'
        : '<span class="t-badge badge-mt">Meeting</span>';
      return `<div class="termin">
        <div class="termin-date"><span class="t-day">${day}</span><span class="t-mon">${mon}</span></div>
        <div class="termin-info"><div class="t-title">${esc(e.title)}</div><div class="t-time">${esc(timeStr)}</div></div>
        ${badge}
      </div>`;
    }).join('');
  } catch {
    el.innerHTML = '<div class="no-data">Server nicht erreichbar – starte brain_server.py</div>';
  }
}

/* ── Gmail ──────────────────────────────────────── */
const AV_COLORS = ['#3B69D6','#1A7A4A','#B7660A','#534AB7','#9B2335','#1A7A6A'];
function avColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xFFFFFF;
  return AV_COLORS[h % AV_COLORS.length];
}
function initials(name) {
  const p = name.trim().split(/\s+/);
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

async function loadGmail() {
  const el = document.getElementById('mail-body');
  try {
    const r = await fetch(`${API}/api/gmail`, {signal: AbortSignal.timeout(20000)});
    if (!r.ok) throw new Error();
    const mails = await r.json();
    if (!mails.length) { el.innerHTML = '<div class="no-data">Posteingang leer.</div>'; return; }
    el.innerHTML = mails.slice(0,6).map(m => {
      const nm = m.from || '?';
      const ini = initials(nm);
      const col = avColor(nm);
      const unread = m.unread ? '<div class="unread-dot"></div>' : '';
      return `<div class="mail" onclick="window.open('https://mail.google.com/mail/u/0/#inbox/${m.id}','_blank')">
        <div class="mail-av" style="background:${col}">${ini}</div>
        <div class="mail-body">
          <div class="mail-from">${esc(nm.slice(0,24))}<span class="mail-time">${esc(m.time)}</span></div>
          <div class="mail-subj">${esc(m.subject.slice(0,52))}</div>
        </div>
        ${unread}
      </div>`;
    }).join('');
  } catch {
    el.innerHTML = '<div class="no-data">Gmail nicht verbunden.</div>';
  }
}

/* ── Tasks ──────────────────────────────────────── */
function flashTaskPanel() {
  const section = document.querySelector('.rp-section:has(#task-body)');
  if (!section) return;
  section.style.transition = 'box-shadow 0.15s ease, border-color 0.15s ease';
  section.style.boxShadow = '0 0 0 2px var(--acc)';
  section.style.borderColor = 'var(--acc)';
  setTimeout(() => {
    section.style.boxShadow = '';
    section.style.borderColor = '';
  }, 1400);
}

async function loadTasks(force) {
  const el = document.getElementById('task-body');
  try {
    const r = await fetch(`${API}/api/tasks`, {signal: AbortSignal.timeout(5000)});
    if (!r.ok) throw new Error();
    const tasks = await r.json();
    const open = tasks.filter(t => !t.done);
    if (!open.length) { el.innerHTML = '<div class="no-data">Keine offenen Aufgaben.</div>'; return; }
    el.innerHTML = open.slice(0,8).map((t,i) => {
      const cls = t.urgency === 'urgent' ? 'dl-urgent' : t.urgency === 'soon' ? 'dl-soon' : 'dl-normal';
      const label = t.urgency === 'urgent' ? '!' : t.urgency === 'soon' ? '→' : '';
      return `<div class="dl-item" id="dlt-${i}">
        <div class="dl-cb" onclick="toggleTask(this,'dlt-${i}')"></div>
        <div class="dl-text">${esc(t.text.slice(0,70))}</div>
        <div class="dl-date ${cls}">${label}</div>
      </div>`;
    }).join('');
  } catch {
    el.innerHTML = '<div class="no-data">Kontext nicht ladbar.</div>';
  }
}

function toggleTask(cb, id) {
  cb.classList.toggle('done');
  document.getElementById(id)?.classList.toggle('done');
}

/* ── LinkedIn ───────────────────────────────────── */
let _liTab = 'posts';

function liTab(tab) {
  _liTab = tab;
  ['posts','ideas','dir'].forEach(t => {
    document.getElementById(`li-${t}`).style.display = t === tab ? 'block' : 'none';
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
}

async function loadLinkedIn(force) {
  await Promise.all([loadLinkedInPosts(force), loadLinkedInIdeas(force), loadLinkedInDirection()]);
}

async function loadLinkedInPosts(force) {
  const el = document.getElementById('li-posts');
  try {
    const r = await fetch(`${API}/api/linkedin/posts`, {signal: AbortSignal.timeout(5000)});
    const d = await r.json();
    if (!d.posts || !d.posts.length) {
      el.innerHTML = '<div class="no-data">Keine geplanten Posts gefunden.</div>';
      return;
    }
    el.innerHTML = d.posts.map(p => {
      const dt = p.termin ? new Date(p.termin) : null;
      const dtStr = dt ? `${dt.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})} · ${dt.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr` : '';
      return `<div class="li-post-card">
        <div class="li-post-day">${esc(dtStr)}</div>
        <div class="li-post-title">${esc(p.idee)}</div>
        <div class="li-post-preview">${esc(p.text_preview)}…</div>
      </div>`;
    }).join('');
  } catch {
    el.innerHTML = '<div class="no-data">Nicht ladbar.</div>';
  }
}

async function loadLinkedInIdeas(force) {
  const el = document.getElementById('li-ideas-list');
  if (!el) return;
  try {
    const r = await fetch(`${API}/api/linkedin/ideas`, {signal: AbortSignal.timeout(5000)});
    const d = await r.json();
    if (!d.ideen || !d.ideen.length) {
      el.innerHTML = '<div class="no-data">Keine Ideen — generiere welche!</div>';
      return;
    }
    const datum = d.datum ? `<div style="font-size:10px;color:var(--tf);margin-bottom:6px">Stand: ${d.datum} · ${d.ideen.length} Ideen</div>` : '';
    el.innerHTML = datum + d.ideen.map(i =>
      `<div class="li-idea-row" title="${esc(i.cta)}">
        <div class="li-idea-kat">${esc(i.kategorie)} · ${esc(i.format)}</div>
        <div class="li-idea-title">${esc(i.titel)}</div>
        <div class="li-idea-hook">${esc(i.hook)}</div>
      </div>`
    ).join('');
  } catch {
    el.innerHTML = '<div class="no-data">Nicht ladbar.</div>';
  }
}

async function generateIdeas(focus = '') {
  const btn = document.getElementById('li-gen-btn');
  const el = document.getElementById('li-ideas-list');
  if (!el) return;
  btn.textContent = '… Generiere Ideen (30–60s)';
  btn.disabled = true;
  el.innerHTML = '<div class="no-data">Claude generiert 10 neue Ideen…</div>';
  try {
    const r = await fetch(`${API}/api/linkedin/generate-ideas`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({focus}),
    });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = `✓ ${d.anzahl} Ideen generiert`;
      await loadLinkedInIdeas();
      setTimeout(() => { btn.textContent = '✦ Neue Ideen generieren'; btn.disabled = false; }, 3000);
    } else {
      btn.textContent = 'Fehler: ' + (d.error || '?');
      btn.disabled = false;
    }
  } catch {
    btn.textContent = 'Fehler – Server erreichbar?';
    btn.disabled = false;
  }
}

async function loadLinkedInDirection() {
  try {
    const r = await fetch(`${API}/api/linkedin/direction`, {signal: AbortSignal.timeout(3000)});
    const d = await r.json();
    if (d.prompt) document.getElementById('li-dir-input').value = d.prompt;
  } catch {}
}

async function generatePosts(spec = '') {
  const el = document.getElementById('li-posts');
  if (!el) return;
  el.innerHTML = '<div class="no-data">Claude schreibt Posts… (30–60s)</div>';
  try {
    const r = await fetch(`${API}/api/linkedin/generate-posts`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({spec}),
    });
    const d = await r.json();
    if (d.ok) {
      await loadLinkedInPosts();
    } else {
      el.innerHTML = `<div class="no-data">Fehler: ${esc(d.error||'?')}</div>`;
    }
  } catch {
    el.innerHTML = '<div class="no-data">Server nicht erreichbar.</div>';
  }
}

async function saveDirection() {
  const prompt = document.getElementById('li-dir-input').value.trim();
  const btn = document.getElementById('li-dir-btn');
  const status = document.getElementById('li-dir-status');
  if (!prompt) return;
  btn.textContent = '…';
  try {
    const r = await fetch(`${API}/api/linkedin/direction`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt}),
    });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = '✓ Gespeichert';
      status.textContent = 'Wird beim nächsten Autoposter-Run gelesen.';
      setTimeout(() => { btn.textContent = 'Richtung speichern'; status.textContent = ''; }, 3000);
    }
  } catch {
    btn.textContent = 'Fehler – Server erreichbar?';
  }
}

/* ── Helpers ────────────────────────────────────── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function now() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function scrollBottom(el) {
  el.scrollTop = el.scrollHeight;
}
function setSendDisabled(v) {
  document.getElementById('send-btn').disabled = v;
}
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

/* ── Datei-Browser ───────────────────────────────── */
let _allFiles = [];

async function loadFiles(force) {
  const body = document.getElementById('fb-body');
  try {
    const r = await fetch(`${API}/api/files`, {signal: AbortSignal.timeout(10000)});
    const d = await r.json();
    _allFiles = d.files || [];
    renderFileTree(_allFiles);
  } catch {
    body.innerHTML = '<div style="font-size:11px;color:var(--tf)">Nicht verfügbar</div>';
  }
}

function extClass(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return 'ext-pdf';
  if (['docx','doc'].includes(ext)) return 'ext-docx';
  if (['xlsx','xls','csv'].includes(ext)) return 'ext-xlsx';
  if (ext === 'md') return 'ext-md';
  return 'ext-other';
}

function renderFileTree(files) {
  const body = document.getElementById('fb-body');
  if (!files.length) { body.innerHTML = '<div style="font-size:11px;color:var(--tf)">Keine Dateien</div>'; return; }

  // Ordnerstruktur aufbauen
  const tree = {};
  files.forEach(f => {
    const parts = f.path.split('/');
    const folder = parts.length > 1 ? parts[0] : '—';
    if (!tree[folder]) tree[folder] = [];
    tree[folder].push(f);
  });

  const _SKIP_FOLDERS = ['_agent','_inbox','.obsidian','.git','_fehler'];
  let html = '';
  Object.keys(tree).sort().forEach(folder => {
    if (_SKIP_FOLDERS.includes(folder)) return;
    const files = tree[folder];
    const id = 'fb-' + folder.replace(/[^a-z0-9]/gi,'_');
    html += `<div class="fb-folder">
      <div class="fb-folder-header" onclick="fbToggle('${id}')">
        <span class="fb-folder-icon" id="${id}-icon">▶</span>
        <span>${folder}</span>
        <span style="margin-left:auto;font-size:10px;color:var(--tf)">${files.length}</span>
      </div>
      <div class="fb-children" id="${id}">`;
    files.forEach(f => {
      const name = f.name;
      const ext = name.split('.').pop().toLowerCase();
      const cls = extClass(name);
      html += `<div class="fb-file" onclick="downloadFile('${f.url}','${name.replace(/'/g,"\\'")}')">
        <span class="fb-file-name" title="${f.path}">${name}</span>
        <span class="fb-ext ${cls}">${ext.toUpperCase()}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  body.innerHTML = html;
}

function fbToggle(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById(id + '-icon');
  const open = el.classList.toggle('open');
  icon.classList.toggle('open', open);
}

function filterFiles(q) {
  if (!q) { renderFileTree(_allFiles); return; }
  const filtered = _allFiles.filter(f => f.path.toLowerCase().includes(q.toLowerCase()));
  renderFileTree(filtered);
}

function downloadFile(url, name) {
  const a = document.createElement('a');
  a.href = API + url;
  a.download = name;
  a.target = '_blank';
  a.click();
}
